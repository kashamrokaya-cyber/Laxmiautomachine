services:
  # Backend Web Service
  - type: web
    name: laxmiauto-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        value: "mongodb+srv://kushalrokaya472_db_user:automachinelaxmi@cluster12.jbyn7zb.mongodb.net/laxmiauto_db?appName=Cluster12"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: laxmiauto-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: laxmiauto-backend
          property: host
    rewriteRules:
      - source: /.*
        destination: /index.html
